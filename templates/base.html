<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>U.S. Immigration Law News by Rob</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    {% if GA_ACCOUNT %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_ACCOUNT }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ GA_ACCOUNT }}');
    </script>
    {% endif %}
    <style>
        :root {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            color: #111;
            background-color: #f9fafb;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #fefefe, #f4f5f7);
        }
        header {
            background: tan;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .header-content {
            flex: 1 1 240px;
        }
        header h1 {
            margin: 0;
            font-size: 1.75rem;
        }
        header h1 a {
            color: inherit;
            text-decoration: none;
        }
        .rss-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #111;
            color: #fefefe;
            border-radius: 999px;
            padding: 0.5rem 0.85rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.25);
        }
        .rss-link img {
            width: 24px;
            height: 24px;
        }
        main {
            padding: 1.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        footer {
            text-align: center;
            padding: 1rem 1.5rem;
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="{% url 'newsfeed:article_list' %}">U.S. Immigration Law News by Rob</a></h1>
            <p>Curated immigration news from the sources Rob trusted.</p>
        </div>
        <a class="rss-link" href="{% url 'newsfeed:feed' %}">
            <img src="{% static 'rss-logo.png' %}" alt="RSS logo">
            RSS Feed
        </a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
